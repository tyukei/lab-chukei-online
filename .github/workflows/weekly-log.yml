name: Weekly Log Update

on:
  schedule:
    # Every Monday at 02:00 UTC (= 11:00 JST)
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not commit)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run log updater
        env:
          GITHUB_TOKEN: ${{ secrets.LOG_GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ vars.LOG_GITHUB_USERNAME }}
          ALLOWLIST_REPOS: ${{ vars.LOG_ALLOWLIST_REPOS }}
        run: node scripts/update-activity-log.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/generated/activity-log.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated log
        if: steps.diff.outputs.changed == 'true' && !inputs.dry_run
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/generated/activity-log.json
          git commit -m "chore: update activity log $(date -u '+%Y-%m-%d')"
          git push
